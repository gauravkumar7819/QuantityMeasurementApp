services:
  # Web Service
  - type: web
    name: quantitymeasurement-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: quantitymeasurementdb_ruab
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # PostgreSQL Database
  - type: postgres
    name: quantitymeasurementdb_ruab
    plan: free
    ipAllowList: []
